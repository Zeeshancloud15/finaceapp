<!DOCTYPE html>
<html>
<head>
    <title>Finance App</title>
</head>
<body>

<h1>Customer Registration</h1>

<form action="/register" method="POST">

    <input type="text"
           name="name"
           placeholder="Name"
           required>

    <br><br>

    <input type="email"
           name="email"
           placeholder="Email"
           required>

    <br><br>

    <input type="text"
           name="phone"
           placeholder="Phone"
           required>

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

<br>

<a href="/login">Login</a>
<br>
<a href="/store">Store</a>
<br>
<a href="/support">Support</a>

</body>
</html>
