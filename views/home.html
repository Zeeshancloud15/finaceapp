<h2>Register</h2>

<form action="/register" method="POST">

    <input type="text"
           name="name"
           placeholder="Name"
           required>

    <br><br>

    <input type="email"
           name="email"
           placeholder="Email"
           required>

    <br><br>

    <input type="text"
           name="phone"
           placeholder="Phone"
           required>

    <br><br>

    <button type="submit">
        Register
    </button>

</form>
